<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klasseromsplanlegger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');
:root{
  --bg:#f5f0e8;--surface:#fffef9;--panel:#1a1a2e;--panel-light:#242440;
  --accent:#e86b3e;--accent2:#4ecdc4;--text:#1a1a2e;--text-light:#6b6b8a;
  --border:#d4cfc4;--desk-empty:#fffef9;--desk-occupied:#d4f0ed;--cell:48px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--panel);color:#fff;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:3px solid var(--accent);min-width:0;overflow:visible;position:relative;z-index:100;}
#app-title{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:300;letter-spacing:.05em;color:#fff;white-space:nowrap;flex-shrink:0;}
#app-title span{color:var(--accent);font-style:italic;}
@media(max-width:700px){#app-title{display:none;}}
.toolbar{display:flex;align-items:center;gap:6px;flex:1;min-width:0;flex-wrap:nowrap;overflow:visible;}
.mode-group{display:flex;background:var(--panel-light);border-radius:6px;padding:2px;gap:2px;flex-shrink:0;}
.mode-btn{padding:5px 10px;border:none;border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;color:#aaa;background:transparent;white-space:nowrap;}
.mode-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(232,107,62,.4);}
.mode-btn:not(.active):hover{background:rgba(255,255,255,.1);color:#fff;}
.sep{width:1px;height:24px;background:rgba(255,255,255,.15);margin:0 2px;flex-shrink:0;}
.tool-btn{padding:5px 10px;border:1px solid rgba(255,255,255,.2);border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;color:#ccc;background:transparent;white-space:nowrap;flex-shrink:0;}
.tool-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.tool-btn.danger:hover{border-color:#e05252;color:#e05252;}
.grid-controls{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.grid-controls label{font-size:.62rem;color:#aaa;}
.grid-controls input[type=number]{width:40px;padding:2px 4px;background:var(--panel-light);border:1px solid rgba(255,255,255,.15);border-radius:3px;color:#fff;font-family:'DM Mono',monospace;font-size:.62rem;text-align:center;}
#lang-toggle{padding:4px 8px;background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:.65rem;color:#ccc;transition:all .15s;white-space:nowrap;flex-shrink:0;margin-left:auto;}
#lang-toggle:hover{border-color:var(--accent2);color:var(--accent2);}
.app-body{display:flex;flex:1;overflow:hidden;}

/* LEFT PANEL */
.left-panel{width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.panel-header{padding:8px 12px 6px;border-bottom:1px solid var(--border);font-size:.62rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--text-light);display:flex;align-items:center;justify-content:space-between;gap:6px;}
.panel-header .count{background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:.58rem;}
.sort-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid var(--border);background:var(--bg);}
.sort-label{font-size:.6rem;color:var(--text-light);white-space:nowrap;letter-spacing:.03em;}
.sort-btns{display:flex;gap:3px;}
.sort-btn{padding:2px 7px;border:1px solid var(--border);border-radius:3px;font-family:'DM Mono',monospace;font-size:.6rem;cursor:pointer;background:transparent;color:var(--text-light);transition:all .1s;}
.sort-btn.active,.sort-btn:hover{border-color:var(--accent2);color:var(--accent2);background:#f0fcfb;}
.student-input-wrap{padding:6px 8px;border-bottom:1px solid var(--border);display:flex;gap:4px;}
.student-input{flex:1;padding:4px 7px;border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:.68rem;background:var(--bg);color:var(--text);outline:none;}
.student-input:focus{border-color:var(--accent2);}
.add-btn{padding:4px 8px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.8rem;font-weight:bold;}
.add-btn:hover{background:#d05a2d;}
.student-list{flex:1;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:2px;}
.student-chip{padding:4px 7px;background:var(--bg);border:1px solid var(--border);border-radius:5px;font-size:.66rem;cursor:grab;display:flex;align-items:center;gap:4px;transition:all .1s;user-select:none;}
.student-chip:hover{border-color:var(--accent2);background:#f0fcfb;}
.student-chip.dragging{opacity:.4;}
.student-chip.seated{opacity:.5;border-style:dashed;cursor:default;}
.student-chip .s-avatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:500;flex-shrink:0;color:#fff;}
.student-chip .s-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.student-chip .s-group-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15);}
.student-chip .del-student{opacity:0;cursor:pointer;color:#e05252;font-size:.8rem;line-height:1;transition:opacity .1s;flex-shrink:0;}
body.student-mode .student-chip:hover .del-student{opacity:1;}
.student-chip.no-drag{cursor:not-allowed;opacity:.55;}
.student-chip.no-drag:hover{border-color:var(--border);background:var(--bg);}
#student-mode-hint{padding:4px 8px;font-size:.58rem;color:var(--text-light);background:#fdf8f0;border-bottom:1px solid var(--border);text-align:center;display:none;}
body:not(.student-mode) #student-mode-hint{display:block;}
body.student-mode #student-mode-hint{display:none;}

/* SELECTION WIDGET */
#selection-widget{border-top:2px solid var(--accent2);background:var(--surface);padding:8px 10px;display:none;flex-direction:column;gap:6px;flex-shrink:0;}
#selection-widget.visible{display:flex;}
#selection-widget .sw-title{font-size:.58rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.07em;}
#selection-widget .sw-title span{color:var(--accent2);}
#selection-widget .sw-colors{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;}
#selection-widget .sw-color{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;}
#selection-widget .sw-color:hover{transform:scale(1.2);}
#selection-widget .sw-color.active{border-color:#1a1a2e;transform:scale(1.15);}
#selection-widget .sw-actions{display:flex;gap:3px;flex-wrap:wrap;}
#selection-widget .sw-btn{flex:1;padding:3px 4px;border-radius:4px;font-family:'DM Mono',monospace;font-size:.58rem;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text-light);transition:all .1s;text-align:center;white-space:nowrap;}
#selection-widget .sw-btn:hover{border-color:var(--accent2);color:var(--accent2);}
#selection-widget .sw-btn.danger:hover{border-color:#e05252;color:#e05252;}

/* OBJECT WIDGET */
#object-widget{border-top:2px solid #9b59b6;background:var(--surface);padding:8px 10px;display:none;flex-direction:column;gap:6px;flex-shrink:0;}
#object-widget.visible{display:flex;}
#object-widget .ow-title{font-size:.58rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.07em;}
.obj-palette{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.obj-tile{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 3px;border:1px solid var(--border);border-radius:6px;background:var(--bg);transition:all .12s;}
.obj-tile:hover{border-color:#9b59b6;background:#f8f0ff;}
.obj-tile img,.obj-tile .obj-label-icon{width:36px;height:36px;object-fit:contain;display:block;}
.obj-tile .obj-label-icon{border-radius:50%;background:#ffe066;border:2px solid #c8a800;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:600;color:#6a5200;}
.obj-tile span{font-size:.55rem;color:var(--text-light);text-align:center;letter-spacing:.03em;}
.obj-tile.active{border-color:#9b59b6;background:#f0e8ff;}
.obj-drop-target{padding:4px 8px;border:1px dashed #e05252;border-radius:4px;text-align:center;font-size:.58rem;color:#e05252;margin-top:2px;}

/* PANEL ACTIONS */
.panel-actions{padding:5px 7px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.panel-action-btn{width:100%;padding:4px 7px;border-radius:4px;font-family:'DM Mono',monospace;font-size:.6rem;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text-light);transition:all .1s;text-align:center;}
.panel-action-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.panel-action-btn.accent{border-color:var(--accent);color:var(--accent);}
.panel-action-btn.accent:hover{background:var(--accent);color:#fff;}
  .panel-action-btn.danger-btn{border-color:#e05252;color:#e05252;}
  .panel-action-btn.danger-btn:hover{background:#e05252;color:#fff;}
.import-export-wrap{padding:6px 7px;border-top:1px solid var(--border);display:flex;gap:3px;flex-direction:column;}
.import-export-wrap label,.import-export-wrap button{display:block;width:100%;padding:4px;text-align:center;border-radius:4px;font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg);color:var(--text-light);}
.import-export-wrap label:hover,.import-export-wrap button:hover{border-color:var(--accent2);color:var(--accent2);}
.import-export-wrap button.export-btn{border-color:var(--accent);color:var(--accent);}
.import-export-wrap button.export-btn:hover{background:var(--accent);color:#fff;}
#import-file{display:none;}
.bulk-import-area{display:none;padding:5px;border-top:1px solid var(--border);}
.bulk-import-area.visible{display:block;}
.bulk-textarea{width:100%;height:65px;padding:4px;font-family:'DM Mono',monospace;font-size:.62rem;border:1px solid var(--border);border-radius:4px;background:var(--bg);resize:none;outline:none;}
.bulk-textarea:focus{border-color:var(--accent2);}
.bulk-actions{display:flex;gap:3px;margin-top:3px;}
.bulk-actions button{flex:1;padding:3px;border-radius:3px;border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:.6rem;cursor:pointer;background:var(--bg);color:var(--text-light);}
.bulk-actions button:first-child{border-color:var(--accent2);color:var(--accent2);}

/* CANVAS */
.canvas-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.canvas-scroll{flex:1;overflow:auto;background:var(--bg);}
#classroom-grid{position:relative;margin:20px;display:inline-block;}
#desks-layer{position:absolute;top:0;left:0;z-index:2;pointer-events:auto;}
#objects-layer{position:absolute;top:0;left:0;z-index:3;pointer-events:none;}

/* DESK */
.desk{position:absolute;width:calc(var(--cell) - 4px);height:calc(var(--cell) - 4px);background:var(--desk-empty);border:2px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.55rem;transition:border-color .12s,box-shadow .12s;pointer-events:all;user-select:none;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.desk.occupied{background:var(--desk-occupied);border-color:#6ecfc9;}
.desk.drag-over{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(232,107,62,.3)!important;}
.desk.selected{box-shadow:0 0 0 3px rgba(78,205,196,.7),0 2px 8px rgba(0,0,0,.15)!important;border-color:var(--accent2)!important;}
.desk.desk-dragging{opacity:.3;}
.desk .desk-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:600;color:#fff;margin-bottom:1px;flex-shrink:0;}
.desk .desk-student{font-size:.55rem;font-weight:500;text-align:center;line-height:1.2;padding:0 2px;word-break:break-word;}

/* ROOM OBJECTS */
.room-obj{position:absolute;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;user-select:none;transition:box-shadow .12s;border-radius:4px;}
.room-obj:hover{box-shadow:0 0 0 2px #9b59b6;}
.room-obj img{width:100%;height:100%;object-fit:contain;display:block;}
.room-obj.label-obj{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;text-align:center;word-break:break-word;padding:4px;line-height:1.2;}
.room-obj.obj-drag-ghost{opacity:.3;}

/* INTERACTION LAYER */
#interaction-layer{position:absolute;top:0;left:0;z-index:10;}

/* LABEL EDITOR */
#label-editor{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);padding:10px;display:none;flex-direction:column;gap:8px;min-width:180px;}
#label-editor.visible{display:flex;}
#label-editor input[type=text]{padding:4px 7px;border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:.7rem;outline:none;width:100%;}
#label-editor input[type=text]:focus{border-color:var(--accent2);}
#label-editor .le-colors{display:flex;gap:4px;flex-wrap:wrap;}
#label-editor .le-color{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
#label-editor .le-color:hover,.le-color.active{transform:scale(1.2);border-color:#333;}
#label-editor .le-actions{display:flex;gap:4px;}
#label-editor .le-btn{flex:1;padding:4px;border-radius:4px;font-family:'DM Mono',monospace;font-size:.6rem;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text-light);text-align:center;}
#label-editor .le-btn.ok{border-color:var(--accent2);color:var(--accent2);}
#label-editor .le-btn.ok:hover{background:var(--accent2);color:#fff;}
#label-editor .le-size-row{display:flex;flex-direction:column;gap:3px;}
#label-editor .le-size-label{font-size:.6rem;color:var(--text-light);letter-spacing:.04em;}
#label-editor .le-size-inputs{display:flex;align-items:center;gap:5px;}
#label-editor .le-size-field{display:flex;align-items:center;gap:3px;font-size:.62rem;color:var(--text-light);}
#label-editor .le-size-field input{width:40px;padding:3px 5px;border:1px solid var(--border);border-radius:3px;font-family:'DM Mono',monospace;font-size:.65rem;text-align:center;outline:none;}
#label-editor .le-size-field input:focus{border-color:var(--accent2);}
#label-editor .le-size-x{font-size:.7rem;color:var(--text-light);}

/* CTX MENU */
#ctx-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9999;padding:4px 0;min-width:140px;display:none;}
#ctx-menu.visible{display:block;}
.ctx-item{padding:6px 12px;font-size:.65rem;cursor:pointer;color:var(--text);transition:background .1s;}
.ctx-item:hover{background:var(--bg);}
.ctx-item.danger{color:#e05252;}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}

/* STATUS BAR */
.status-bar{background:var(--panel);color:#888;font-size:.6rem;padding:3px 12px;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;}
#status-hint{color:#aaa;}

/* DRAG GHOST */
#drag-ghost{position:fixed;pointer-events:none;z-index:10000;opacity:.9;transform:translate(-50%,-50%) rotate(2deg) scale(1.04);background:var(--panel);color:#fff;padding:4px 10px;border-radius:6px;font-size:.68rem;display:none;box-shadow:0 8px 20px rgba(0,0,0,.3);border:2px solid var(--accent);white-space:nowrap;}

/* AUTOSAVE */
#autosave-indicator{position:fixed;bottom:28px;right:10px;font-size:.58rem;color:var(--text-light);opacity:0;transition:opacity .4s;pointer-events:none;background:var(--surface);border:1px solid var(--border);padding:2px 7px;border-radius:20px;}
#autosave-indicator.show{opacity:1;}

body.wall-mode .canvas-scroll{cursor:crosshair;}
body.object-mode .canvas-scroll{cursor:cell;}
.student-list::-webkit-scrollbar,.canvas-scroll::-webkit-scrollbar{width:5px;height:5px;}
.student-list::-webkit-scrollbar-thumb,.canvas-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── DROPDOWN MENUS ── */
.dropdown{position:relative;flex-shrink:0;}
.dropdown-btn{padding:5px 11px;border:1px solid rgba(255,255,255,.25);border-radius:4px;cursor:pointer;font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;color:#ddd;background:transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.dropdown-btn:hover,.dropdown-btn.open{border-color:var(--accent2);color:var(--accent2);}
.dropdown-btn::after{content:'▾';font-size:.6rem;opacity:.7;}
.dropdown-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:7px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:9500;min-width:180px;padding:4px 0;display:none;}
.dropdown-menu.open{display:block;}
.dropdown-menu .dm-item{padding:8px 14px;font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;color:var(--text);transition:background .1s;white-space:nowrap;display:block;width:100%;text-align:left;background:transparent;border:none;border-radius:0;}
.dropdown-menu .dm-item:hover{background:var(--bg);}
.dropdown-menu .dm-item.danger{color:#e05252;}
.dropdown-menu .dm-item.danger:hover{background:#fff0f0;}
.dropdown-menu .dm-sep{height:1px;background:var(--border);margin:3px 0;}

/* ── PANEL BOTTOM ── */
.panel-bottom{padding:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.pbot-row{display:flex;gap:5px;}
.pbot-btn{flex:1;padding:6px 4px;border-radius:5px;font-family:'DM Mono',monospace;font-size:.68rem;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text-light);transition:all .12s;text-align:center;letter-spacing:.02em;}
.pbot-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.pbot-btn.accent{border-color:var(--accent);color:var(--accent);}
.pbot-btn.accent:hover{background:var(--accent);color:#fff;}
.pbot-btn.full{flex:none;width:100%;}

/* ── POPUP OVERLAY ── */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:7000;display:none;align-items:center;justify-content:center;}
.popup-overlay.open{display:flex;}
.popup-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.22);padding:18px 20px;min-width:220px;display:flex;flex-direction:column;gap:8px;}
.popup-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:300;color:var(--text);margin-bottom:2px;}
.popup-btn{padding:9px 14px;border-radius:6px;font-family:'DM Mono',monospace;font-size:.75rem;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);transition:all .12s;text-align:left;letter-spacing:.02em;}
.popup-btn:hover{border-color:var(--accent2);color:var(--accent2);background:#f0fcfb;}
.popup-btn.primary{border-color:var(--accent);color:var(--accent);}
.popup-btn.primary:hover{background:var(--accent);color:#fff;}
.popup-close{align-self:flex-end;background:none;border:none;cursor:pointer;color:var(--text-light);font-size:1rem;line-height:1;padding:0;}
.popup-close:hover{color:var(--text);}

/* ── GLOBAL FONT SIZE BUMP ── */
.mode-btn{font-size:.75rem !important;}
.student-chip{font-size:.73rem !important;}
.panel-header{font-size:.68rem !important;}
.sort-btn{font-size:.6rem !important;}
.status-bar{font-size:.68rem !important;}
#status-hint{color:#bbb !important;}
</style>
</head>
<body class="desk-mode">

<header>
  <h1 id="app-title">Klasserom <span>Planlegger</span></h1>
  <div class="toolbar">
    <div class="mode-group">
      <button class="mode-btn" id="btn-wall" onclick="setMode('wall')" data-i18n="modeWall"></button>
      <button class="mode-btn active" id="btn-desk" onclick="setMode('desk')" data-i18n="modeDesk"></button>
      <button class="mode-btn" id="btn-student" onclick="setMode('student')" data-i18n="modeStudent"></button>
      <button class="mode-btn" id="btn-object" onclick="setMode('object')" data-i18n="modeObject"></button>
    </div>
    <div class="sep"></div>
    <!-- Manage dropdown -->
    <div class="dropdown" id="dd-manage">
      <button class="dropdown-btn" id="dd-manage-btn" data-i18n="menuManage"></button>
      <div class="dropdown-menu" id="dd-manage-menu">
        <button class="dm-item" id="dm-clearWalls" data-i18n="clearWalls"></button>
        <button class="dm-item" id="dm-clearDesks" data-i18n="clearDesks"></button>
        <button class="dm-item" id="dm-clearStudents" data-i18n="clearStudents"></button>
        <div class="dm-sep"></div>
        <button class="dm-item danger" id="dm-resetAll" data-i18n="resetAll"></button>
      </div>
    </div>
    <div class="sep"></div>
    <!-- Save/Load dropdown -->
    <div class="dropdown" id="dd-save">
      <button class="dropdown-btn" id="dd-save-btn" data-i18n="menuSave"></button>
      <div class="dropdown-menu" id="dd-save-menu">

// AUTOSAVE

const SAVE_KEY='classroom-arranger-v2';
function saveState(){
  try{
    const data=JSON.stringify({v:2,cols:COLS,rows:ROWS,w:[...walls],d:desks,s:students,o:roomObjs,m:mode,l:lang,sm:sortMode});
    localStorage.setItem(SAVE_KEY,data);
    const ind=document.getElementById('autosave-indicator');
    ind.textContent=t('autosave'); ind.classList.add('show');
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>ind.classList.remove('show'),1200);
  }catch(e){}
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveState,600);}
function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return null;
    const d=JSON.parse(raw);
    COLS=d.cols||20;ROWS=d.rows||15;
    document.getElementById('grid-cols').value=COLS;
    document.getElementById('grid-rows').value=ROWS;
    walls=new Set(d.w||[]);
    desks=(d.d||[]).map(x=>({...x,groupColor:x.groupColor||null}));
    students=d.s||[];
    roomObjs=(d.o||[]).map(x=>({...x,rotation:x.rotation||0,text:x.text||'',color:x.color||'#ffe066',lw:x.lw||1,lh:x.lh||1}));
    deskCounter=desks.length?Math.max(...desks.map(x=>x.id)):0;
    studentCounter=students.length?Math.max(...students.map(x=>x.id)):0;
    objCounter=roomObjs.length?Math.max(...roomObjs.map(x=>x.id)):0;
    if(d.l)lang=d.l;
    if(d.sm)sortMode=d.sm;
    return d.m||'desk';

}

const AVATAR_COLORS=['#e8523a','#3aabe8','#3ae88a','#e8a83a','#9b3ae8','#e83a9b','#3ae8d4','#8ae83a','#e8e83a','#3a5be8','#e86b3a','#3ae86b','#c73ae8','#e8c73a','#3ac7e8'];
const GROUP_COLORS=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#8bc34a','#ff5722','#607d8b'];
function getColor(i){return AVATAR_COLORS[i%AVATAR_COLORS.length];}
function initials(n){return n.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';}
function darkenColor(hex,amount){
  if(!hex||!hex.startsWith('#'))return hex;
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-amount);g=Math.max(0,g-amount);b=Math.max(0,b-amount);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function isColorDark(hex){
  if(!hex||!hex.startsWith('#'))return false;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)<160;
}

// ══════════════════════════════════════════════════════════════════════
// GRID
// ══════════════════════════════════════════════════════════════════════
function setupGrid(){
  const W=COLS*CELL,H=ROWS*CELL;
  document.getElementById('classroom-grid').style.cssText=`width:${W}px;height:${H}px`;
  ['grid-bg-canvas','wall-canvas','interaction-layer'].forEach((id,i)=>{
    const c=document.getElementById(id);
    c.width=W;c.height=H;
    Object.assign(c.style,{width:W+'px',height:H+'px',position:'absolute',top:'0',left:'0',zIndex:String([0,1,10][i])});
  });
  ['desks-layer','objects-layer'].forEach((id,i)=>{
    const dl=document.getElementById(id);
    Object.assign(dl.style,{position:'absolute',top:'0',left:'0',zIndex:String(2+i),pointerEvents:'auto',width:W+'px',height:H+'px'});
  });
  drawGridBg(); renderWalls();
}
function drawGridBg(){
  const c=document.getElementById('grid-bg-canvas'),ctx=c.getContext('2d');
  ctx.fillStyle='#f5f0e8'; ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle='#c8c2b4'; ctx.lineWidth=0.8;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,c.height);ctx.stroke();}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(c.width,i*CELL);ctx.stroke();}
}
function resizeGrid(){
  COLS=Math.max(5,Math.min(40,+document.getElementById('grid-cols').value||20));
  ROWS=Math.max(5,Math.min(30,+document.getElementById('grid-rows').value||15));
  desks=desks.filter(d=>d.col<COLS&&d.row<ROWS);
  roomObjs=roomObjs.filter(o=>o.col<COLS&&o.row<ROWS);
  walls=new Set([...walls].filter(k=>{const[,r,c]=k.split(':');return+r>=0&&+r<=ROWS&&+c>=0&&+c<=COLS;}));
  selectedDesks.clear();
  setupGrid();renderDesks();renderRoomObjs();updateStatus();hideWidget();scheduleSave();
}

// ══════════════════════════════════════════════════════════════════════
// WALLS
// ══════════════════════════════════════════════════════════════════════
function renderWalls(){
  const c=document.getElementById('wall-canvas'),ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  ctx.strokeStyle='#1a1a2e';ctx.lineWidth=3;ctx.lineCap='square';
  for(const key of walls){
    const[tp,rs,cs]=key.split(':');
    const r=+rs,col=+cs;
    ctx.beginPath();
    if(tp==='h'){
      // h:r:c draws horizontal line at y=(r+1)*CELL — r=-1 draws at y=0 (top edge)
      const y=(r+1)*CELL;
      if(y<0||y>c.height)continue;
      ctx.moveTo(col*CELL,y);ctx.lineTo((col+1)*CELL,y);
    }else{
      // v:r:c draws vertical line at x=(col+1)*CELL — col=-1 draws at x=0 (left edge)
      const x=(col+1)*CELL;
      if(x<0||x>c.width)continue;
      ctx.moveTo(x,r*CELL);ctx.lineTo(x,(r+1)*CELL);
    }
    ctx.stroke();
  }
}
function clearWalls(){if(!confirm(t('confirmClearWalls')))return;walls.clear();renderWalls();scheduleSave();}
function getSnapEdge(e){
  const rect=ic.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const col=Math.round(x/CELL),row=Math.round(y/CELL);
  const nearH=Math.abs(y-row*CELL),nearV=Math.abs(x-col*CELL);
  if(nearH<nearV){
    // Horizontal wall: row 0 = top edge, row ROWS = bottom edge — all allowed
    if(row<0||row>ROWS)return null;
    const c=Math.floor(x/CELL);
    if(c<0||c>=COLS)return null;
    // key uses row-1 internally: row 0 maps to h:-1:c, but we need h:0:c for top edge
    // Store as h:row:c meaning "top edge of row row" (i.e. between row-1 and row)
    // For row=0 this is the very top outer edge
    return{key:`h:${row-1}:${c}`,axis:'h',row:row-1,col:c};
  }else{
    // Vertical wall: col 0 = left edge, col COLS = right edge — all allowed
    if(col<0||col>COLS)return null;
    const r=Math.floor(y/CELL);
    if(r<0||r>=ROWS)return null;
    return{key:`v:${r}:${col-1}`,axis:'v',row:r,col:col-1};
  }
}

// ══════════════════════════════════════════════════════════════════════
// PREVIEW
// ══════════════════════════════════════════════════════════════════════
function clearPreview(){ic.getContext('2d').clearRect(0,0,ic.width,ic.height);}
function drawWallPreview(key){
  clearPreview();if(!key)return;
  const ctx=ic.getContext('2d'),[tp,r,col]=key.split(':');
  ctx.strokeStyle=walls.has(key)?'rgba(224,82,82,.7)':'rgba(78,205,196,.85)';
  ctx.lineWidth=4;ctx.lineCap='square';ctx.setLineDash([6,4]);
  ctx.beginPath();
  if(tp==='h'){ctx.moveTo(+col*CELL,(+r+1)*CELL);ctx.lineTo((+col+1)*CELL,(+r+1)*CELL);}
  else{ctx.moveTo((+col+1)*CELL,+r*CELL);ctx.lineTo((+col+1)*CELL,(+r+1)*CELL);}
  ctx.stroke();ctx.setLineDash([]);
}
function drawDeskPreview(hCol,hRow,drawing,sCol,sRow,axis){
  clearPreview();if(hCol<0)return;
  const ctx=ic.getContext('2d'),cells=[];
  if(!drawing){cells.push({col:hCol,row:hRow});}
  else if(axis==='h'||axis===null){
    const r=sRow,c0=Math.min(sCol,hCol),c1=Math.max(sCol,hCol);
    for(let c=c0;c<=c1;c++)cells.push({col:c,row:r});
  }else{
    const c=sCol,r0=Math.min(sRow,hRow),r1=Math.max(sRow,hRow);
    for(let r=r0;r<=r1;r++)cells.push({col:c,row:r});
  }
  for(const{col,row}of cells){
    const has=!!desks.find(d=>d.col===col&&d.row===row);
    ctx.fillStyle=has?'rgba(255,200,100,.3)':'rgba(78,205,196,.3)';
    ctx.strokeStyle=has?'rgba(255,160,0,.8)':'rgba(78,205,196,.9)';
    ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(col*CELL+3,row*CELL+3,CELL-6,CELL-6,5);
    ctx.fill();ctx.stroke();
  }
}
function drawDeskDragPreview(col,row,deskId){
  clearPreview();if(col<0||col>=COLS||row<0||row>=ROWS)return;
  const ctx=ic.getContext('2d');
  const occupied=desks.find(d=>d.id!==deskId&&d.col===col&&d.row===row);
  ctx.fillStyle=occupied?'rgba(255,230,109,.35)':'rgba(78,205,196,.3)';
  ctx.strokeStyle=occupied?'rgba(200,160,0,.85)':'rgba(78,205,196,.9)';
  ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(col*CELL+3,row*CELL+3,CELL-6,CELL-6,5);
  ctx.fill();ctx.stroke();
}
function drawObjPreview(hCol,hRow){
  clearPreview();
  if(!selectedObjType||hCol<0)return;
  const ctx=ic.getContext('2d');
  let[cw,rh]=OBJ_SIZES[selectedObjType]||[1,1];
  ctx.fillStyle='rgba(155,89,182,.25)';
  ctx.strokeStyle='rgba(155,89,182,.8)';
  ctx.lineWidth=2;ctx.beginPath();
  ctx.roundRect(hCol*CELL+3,hRow*CELL+3,cw*CELL-6,rh*CELL-6,5);
  ctx.fill();ctx.stroke();
}

// DESKS
// ══════════════════════════════════════════════════════════════════════
function addDeskAt(col,row){
  if(desks.find(d=>d.col===col&&d.row===row))return;
  desks.push({id:++deskCounter,col,row,studentId:null,groupColor:null});
  renderDesks();updateStatus();scheduleSave();
}
function removeDesk(id){
  desks=desks.filter(d=>d.id!==id);selectedDesks.delete(id);
  renderDesks();updateStatus();updateWidget();scheduleSave();
}
function deleteSelectedDesks(){
  desks=desks.filter(d=>!selectedDesks.has(d.id));selectedDesks.clear();
  renderDesks();updateStatus();hideWidget();scheduleSave();
}
function clearGroupColor(){
  for(const id of selectedDesks){const d=desks.find(x=>x.id===id);if(d)d.groupColor=null;}
  selectedDesks.clear();renderDesks();renderStudentList();hideWidget();scheduleSave();
}
function applyGroupColor(color){
  for(const id of selectedDesks){const d=desks.find(x=>x.id===id);if(d)d.groupColor=color;}
  selectedDesks.clear();renderDesks();renderStudentList();hideWidget();scheduleSave();
}
function deselectAll(){selectedDesks.clear();renderDesks();hideWidget();}

function renderDesks(){
  const layer=document.getElementById('desks-layer');
  layer.innerHTML='';
  for(const desk of desks){
    const gc=desk.groupColor,sel=selectedDesks.has(desk.id);
    const el=document.createElement('div');
    el.className='desk'+(desk.studentId?' occupied':'')+(sel?' selected':'');
    el.id=`desk-${desk.id}`;
    el.style.left=desk.col*CELL+2+'px';
    el.style.top=desk.row*CELL+2+'px';
    if(gc){el.style.background=gc;el.style.borderColor=sel?'':gc;}
    else{el.style.background='';el.style.borderColor='';}
    const student=desk.studentId?students.find(s=>s.id===desk.studentId):null;
    if(student){
      const av=document.createElement('div');
      av.className='desk-avatar';av.style.background=student.color;
      av.textContent=initials(student.name);el.appendChild(av);
      const nm=document.createElement('div');
      nm.className='desk-student';
      if(gc)nm.style.color=isColorDark(gc)?'#fff':'#1a1a2e';
      nm.textContent=student.name.split(' ')[0];el.appendChild(nm);
    }
    el.addEventListener('contextmenu',e=>{e.preventDefault();showCtxMenu(e,desk.id);});
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');handleDropOnDesk(desk.id,e);});
    layer.appendChild(el);
  }
  renderStudentList();
}

// ROOM OBJECTS
// ══════════════════════════════════════════════════════════════════════
function addRoomObj(type,col,row){
  roomObjs.push({id:++objCounter,type,col,row,rotation:0,text:type==='label'?'Label':'',color:'#ffe066',lw:1,lh:1});
  renderRoomObjs();scheduleSave();
}
function removeRoomObj(id){
  roomObjs=roomObjs.filter(o=>o.id!==id);
  renderRoomObjs();scheduleSave();
}
function rotateRoomObj(id){
  const o=roomObjs.find(x=>x.id===id);
  if(!o)return;
  o.rotation=(o.rotation+90)%360;
  renderRoomObjs();scheduleSave();
}

function getObjPxSize(type,rotation,obj){
  let cw,rh;
  if(type==='label'&&obj){cw=obj.lw||1;rh=obj.lh||1;}
  else{[cw,rh]=OBJ_SIZES[type]||[1,1];}
  if(type!=='label'&&(rotation===90||rotation===270)){[cw,rh]=[rh,cw];}
  return[cw*CELL-4,rh*CELL-4];
}

// Object type visual config: [bg, border, textColor, abbrev]
const OBJ_STYLE={
  door:        ['#c8dff0','#3a7abf','#1a3a5c','\u25a1'],  // blue, door symbol
  board:       ['#e8f0e0','#4a7a3a','#1a3a1a','\u25ac'],  // green, wide bar
  podium:      ['#f0e8c8','#8a6a20','#4a3a00','\u25a3'],  // amber, podium
  podium_small:['#f0e8c8','#8a6a20','#4a3a00','\u25a2'],  // amber, small
  label:       ['#ffe066','#c8a800','#5a4200','A'],
};
function renderRoomObjs(){
  const layer=document.getElementById('objects-layer');
  layer.innerHTML='';
  layer.style.pointerEvents=mode==='object'?'auto':'none';
  for(const obj of roomObjs){
    const[pw,ph]=getObjPxSize(obj.type,obj.rotation,obj);
    const el=document.createElement('div');
    el.className='room-obj'+(obj.type==='label'?' label-obj':'');
    el.id=`obj-${obj.id}`;
    el.style.left=obj.col*CELL+2+'px';
    el.style.top=obj.row*CELL+2+'px';
    el.style.width=pw+'px';
    el.style.height=ph+'px';
    // Only show hover ring and pointer in object mode
    el.style.pointerEvents=mode==='object'?'all':'none';
    el.style.cursor=mode==='object'?'pointer':'default';

    // Unified styled-box rendering (same in editor and export)
    const sty=OBJ_STYLE[obj.type]||['#e8e0d4','#9b59b6','#333','?'];
    if(obj.type==='label'){
      const lc=obj.color||'#ffe066';
      const isCircle=(obj.lw||1)===1&&(obj.lh||1)===1;
      el.style.borderRadius=isCircle?'50%':'8px';
      el.style.background=lc;
      el.style.border=`2px solid ${darkenColor(lc,30)}`;
      el.style.color=isColorDark(lc)?'#fff':'rgba(0,0,0,0.72)';
      el.style.fontWeight='600';
      el.style.textAlign='center';
      el.style.wordBreak='break-word';
      el.style.padding='4px';
      el.style.lineHeight='1.2';
      el.style.overflow='hidden';
      // Fit font size so text stays inside
      const maxDim=Math.min(pw,ph);
      el.style.fontSize=Math.max(8,Math.floor(maxDim*0.22))+'px';
      el.textContent=obj.text||'?';
    }else{
      el.style.background=sty[0];
      el.style.border=`2px solid ${sty[1]}`;
      el.style.borderRadius='4px';
      el.style.flexDirection='column';
      el.style.gap='2px';
      // Icon row
      const icon=document.createElement('div');
      icon.style.cssText=`font-size:${Math.min(pw,ph)*0.38}px;line-height:1;color:${sty[1]};`;
      icon.textContent=sty[3];
      el.appendChild(icon);
      // Label row
      const lbl=document.createElement('div');
      lbl.style.cssText=`font-size:${Math.min(pw*0.18,9)}px;color:${sty[2]};text-align:center;line-height:1.1;padding:0 2px;`;
      lbl.textContent=t('obj'+obj.type.charAt(0).toUpperCase()+obj.type.slice(1));
      el.appendChild(lbl);

    }

    // Only interact in object mode
    el.addEventListener('click',e=>{
      if(mode!=='object')return;
      e.stopPropagation();
      if(obj.type==='label'){openLabelEditor(obj.id,e);}
      else{rotateRoomObj(obj.id);}
    });

    el.addEventListener('mousedown',e=>{
      if(mode!=='object')return;
      e.preventDefault();
      objDragState={objId:obj.id,startX:e.clientX,startY:e.clientY,moved:false};
      const g=document.getElementById('drag-ghost');
      g.textContent=t('obj'+obj.type.charAt(0).toUpperCase()+obj.type.slice(1));
      g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';
    });

    layer.appendChild(el);
  }
}

// Label editor
function openLabelEditor(objId,e){
  editingLabelId=objId;
  const obj=roomObjs.find(o=>o.id===objId);
  if(!obj)return;
  document.getElementById('label-text').value=obj.text||'';
  const ed=document.getElementById('label-editor');
  // Build color swatches
  const lc=document.getElementById('le-colors');
  lc.innerHTML='';
  LABEL_COLORS.forEach(c=>{
    const s=document.createElement('div');
    s.className='le-color'+(obj.color===c?' active':'');
    s.style.background=c;s.style.border='2px solid '+(c===(obj.color||'#ffe066')?'#333':'transparent');
    s.addEventListener('click',()=>{
      document.querySelectorAll('.le-color').forEach(x=>x.style.border='2px solid transparent');
      s.style.border='2px solid #333';
      editingLabelColor=c;
    });
    lc.appendChild(s);
  });
  editingLabelColor=obj.color||'#ffe066';
  document.getElementById('label-w').value=obj.lw||1;
  document.getElementById('label-h').value=obj.lh||1;
  ed.style.left=Math.min(e.clientX,window.innerWidth-220)+'px';
  ed.style.top=Math.min(e.clientY+8,window.innerHeight-200)+'px';
  ed.classList.add('visible');
  setTimeout(()=>document.getElementById('label-text').focus(),50);
}
let editingLabelColor='#ffe066';
function saveLabelEdit(){
  const obj=roomObjs.find(o=>o.id===editingLabelId);
  if(obj){
    obj.text=document.getElementById('label-text').value||'?';
    obj.color=editingLabelColor;
    obj.lw=Math.max(1,Math.min(8,parseInt(document.getElementById('label-w').value)||1));
    obj.lh=Math.max(1,Math.min(8,parseInt(document.getElementById('label-h').value)||1));
  }
  closeLabelEditor();
  renderRoomObjs();scheduleSave();
}
function closeLabelEditor(){
  document.getElementById('label-editor').classList.remove('visible');
  editingLabelId=null;
}

// Object palette
function buildObjPalette(){
  const pal=document.getElementById('obj-palette');
  if(!pal)return;
  pal.innerHTML='';
  const types=['door','board','podium','podium_small','label'];
  types.forEach(type=>{
    const tile=document.createElement('div');
    tile.className='obj-tile'+(selectedObjType===type?' active':'');
    tile.addEventListener('mousedown',e=>{
      if(e.button!==0)return;
      e.preventDefault();

      paletteDragType=type;

      paletteDragStartX=e.clientX;
      paletteDragStartY=e.clientY;
    });
    if(type==='label'){
      const icon=document.createElement('div');
      icon.className='obj-label-icon';icon.textContent='A';
      tile.appendChild(icon);

      const img=document.createElement('img');
      img.src=OBJ_SVGS[type];img.width=36;img.height=36;
      tile.appendChild(img);
    }
    const lbl=document.createElement('span');
    lbl.textContent=t('obj'+type.charAt(0).toUpperCase()+type.slice(1));
    tile.appendChild(lbl);
    pal.appendChild(tile);
  });
}

// ══════════════════════════════════════════════════════════════════════
// INTERACTION LAYER
// ══════════════════════════════════════════════════════════════════════
let icMouseDownInfo=null;
function getCellXY(e){
  const rect=ic.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  const col=Math.floor(x/CELL),row=Math.floor(y/CELL);
  return(col>=0&&col<COLS&&row>=0&&row<ROWS)?{x,y,col,row}:null;
}

function setupInteractionLayer(){
  ic=document.getElementById('interaction-layer');
  ic.addEventListener('mousedown',e=>{
    if(e.button!==0)return;e.preventDefault();
    if(mode==='wall'){
      const snap=getSnapEdge(e);if(!snap)return;
      wallErasing=walls.has(snap.key);wallDrawing=true;
      wallAxis=snap.axis;wallAxisFixed=snap.axis==='h'?snap.row:snap.col;
      if(wallErasing)walls.delete(snap.key);else walls.add(snap.key);
      renderWalls();drawWallPreview(snap.key);wallLastCell=snap.key;
      return;
    }
    if(mode==='desk'){
      const cell=getCellXY(e);if(!cell)return;
      const existing=desks.find(d=>d.col===cell.col&&d.row===cell.row);
      icMouseDownInfo={x:e.clientX,y:e.clientY,col:cell.col,row:cell.row,deskId:existing?.id??null};
      if(existing){
        deskDragState={deskId:existing.id,origCol:existing.col,origRow:existing.row,
          startX:e.clientX,startY:e.clientY,
          gridRect:document.getElementById('classroom-grid').getBoundingClientRect(),moved:false};
      }else{
        deskDrawing=true;deskDrawAxis=null;
        deskDrawStartCol=cell.col;deskDrawStartRow=cell.row;
        deskDrawLastCell=`${cell.col}:${cell.row}`;
        addDeskAt(cell.col,cell.row);
        drawDeskPreview(cell.col,cell.row,false,0,0,null);
      }
    }
    if(mode==='object'){
      // Placement is done via palette drag (mousedown→mousemove→mouseup)
      // IC mousedown in object mode: nothing to do (objects handle their own mousedown)
    }
  });

  ic.addEventListener('mousemove',e=>{
    const rect=ic.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    if(mode==='wall'){
      if(wallDrawing){
        let key=null;
        if(wallAxis==='h'){const c=Math.floor(x/CELL);if(c>=0&&c<COLS)key=`h:${wallAxisFixed}:${c}`;}
        else{const r=Math.floor(y/CELL);if(r>=0&&r<ROWS)key=`v:${r}:${wallAxisFixed}`;}
        if(key&&key!==wallLastCell){if(wallErasing)walls.delete(key);else walls.add(key);renderWalls();wallLastCell=key;}
        drawWallPreview(key);
      }else{drawWallPreview(getSnapEdge(e)?.key??null);}
      return;
    }
    if(mode==='desk'){
      const col=Math.floor(x/CELL),row=Math.floor(y/CELL);
      const inBounds=col>=0&&col<COLS&&row>=0&&row<ROWS;
      if(deskDragState&&icMouseDownInfo){
        const dx=e.clientX-icMouseDownInfo.x,dy=e.clientY-icMouseDownInfo.y;
        if(!deskDragState.moved&&(Math.abs(dx)>5||Math.abs(dy)>5)){
          deskDragState.moved=true;
          document.getElementById(`desk-${deskDragState.deskId}`)?.classList.add('desk-dragging');
          const g=document.getElementById('drag-ghost');
          g.textContent=`${t('deskLabel')} #${deskDragState.deskId}`;g.style.display='block';
        }
        if(deskDragState.moved){
          const g=document.getElementById('drag-ghost');
          g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';
          if(inBounds)drawDeskDragPreview(col,row,deskDragState.deskId);else clearPreview();
        }
        return;
      }
      if(deskDrawing&&inBounds){
        const dc=Math.abs(col-deskDrawStartCol),dr=Math.abs(row-deskDrawStartRow);
        if(deskDrawAxis===null&&(dc>0||dr>0))deskDrawAxis=dc>=dr?'h':'v';
        const axis=deskDrawAxis||'h',cellKey=`${col}:${row}`;
        if(cellKey!==deskDrawLastCell){
          if(axis==='h'){
            const r=deskDrawStartRow,c0=Math.min(deskDrawStartCol,col),c1=Math.max(deskDrawStartCol,col);
            for(let c=c0;c<=c1;c++)if(!desks.find(d=>d.col===c&&d.row===r))addDeskAt(c,r);
          }else{
            const c=deskDrawStartCol,r0=Math.min(deskDrawStartRow,row),r1=Math.max(deskDrawStartRow,row);
            for(let r=r0;r<=r1;r++)if(!desks.find(d=>d.col===c&&d.row===r))addDeskAt(c,r);
          }
          deskDrawLastCell=cellKey;
        }
        drawDeskPreview(col,row,true,deskDrawStartCol,deskDrawStartRow,deskDrawAxis);
        return;
      }
      if(inBounds)drawDeskPreview(col,row,false,0,0,null);else clearPreview();
    }
    if(mode==='object'&&selectedObjType){
      const col=Math.floor(x/CELL),row=Math.floor(y/CELL);
      if(col>=0&&col<COLS&&row>=0&&row<ROWS)drawObjPreview(col,row);else clearPreview();
    }
  });

  ic.addEventListener('mouseleave',()=>{if(!wallDrawing&&!deskDrawing&&!deskDragState)clearPreview();});

  ic.addEventListener('dragover',e=>{
    e.preventDefault();
    for(const el of document.elementsFromPoint(e.clientX,e.clientY))
      if(el!==ic&&el.id?.startsWith('desk-')){el.classList.add('drag-over');break;}
  });
  ic.addEventListener('dragleave',()=>{
    document.querySelectorAll('.desk.drag-over').forEach(el=>el.classList.remove('drag-over'));
  });
  ic.addEventListener('drop',e=>{
    e.preventDefault();
    document.querySelectorAll('.desk.drag-over').forEach(el=>el.classList.remove('drag-over'));
    for(const el of document.elementsFromPoint(e.clientX,e.clientY))
      if(el!==ic&&el.id?.startsWith('desk-')){handleDropOnDesk(parseInt(el.id.split('-')[1]),e);return;}
  });
}

window.addEventListener('mouseup',e=>{
  // Palette drag: place object on release over grid
  if(paletteDragType){
    const type=paletteDragType;
    paletteDragType=null;
    paletteDragActive=false;
    document.getElementById('drag-ghost').style.display='none';
    clearPreview();
    const gr=document.getElementById('classroom-grid').getBoundingClientRect();
    const col=Math.floor((e.clientX-gr.left)/CELL);
    const row=Math.floor((e.clientY-gr.top)/CELL);
    if(col>=0&&col<COLS&&row>=0&&row<ROWS){
      addRoomObj(type,col,row);
    }
    // Don't set selectedObjType — pure drag-to-place, no selection state
    return;
  }
  if(wallDrawing){wallDrawing=false;wallLastCell=null;wallAxis=null;wallAxisFixed=null;clearPreview();scheduleSave();}
  if(deskDrawing){deskDrawing=false;deskDrawLastCell=null;deskDrawAxis=null;icMouseDownInfo=null;clearPreview();scheduleSave();}
  if(deskDragState){
    const{deskId,origCol,origRow,gridRect,moved}=deskDragState;
    deskDragState=null;
    document.getElementById('drag-ghost').style.display='none';
    document.getElementById(`desk-${deskId}`)?.classList.remove('desk-dragging');
    clearPreview();
    if(moved){
      const col=Math.floor((e.clientX-gridRect.left)/CELL);
      const row=Math.floor((e.clientY-gridRect.top)/CELL);
      if(col>=0&&col<COLS&&row>=0&&row<ROWS){
        const desk=desks.find(d=>d.id===deskId);
        const other=desks.find(d=>d.id!==deskId&&d.col===col&&d.row===row);
        if(other){other.col=origCol;other.row=origRow;}
        if(desk){desk.col=col;desk.row=row;}
      }
      renderDesks();updateStatus();scheduleSave();
    }else{
      if(selectedDesks.has(deskId))selectedDesks.delete(deskId);else selectedDesks.add(deskId);
      renderDesks();updateWidget();
    }
    icMouseDownInfo=null;
  }
  if(studentDeskDrag){
    document.getElementById('drag-ghost').style.display='none';
    const{deskId:fromId,studentId}=studentDeskDrag;
    studentDeskDrag=null;
    document.getElementById(`desk-${fromId}`)?.style&&(document.getElementById(`desk-${fromId}`).style.opacity='');
    const target=getDeskAtPoint(e.clientX,e.clientY);
    if(target&&target.id!==fromId){
      const fromDesk=desks.find(d=>d.id===fromId);
      const swap=target.studentId;
      fromDesk.studentId=swap||null;
      target.studentId=studentId;
    }else if(!target){
      const fromDesk=desks.find(d=>d.id===fromId);
      if(fromDesk)fromDesk.studentId=null;
    }
    renderDesks();updateStatus();scheduleSave();
  }
  // Object drag: move to new cell, or remove if dropped on panel
  if(objDragState){
    const g=document.getElementById('drag-ghost');g.style.display='none';
    const{objId,moved}=objDragState;objDragState=null;
    const el=document.getElementById(`obj-${objId}`);
    if(el)el.classList.remove('obj-drag-ghost');
    clearPreview();
    if(moved){
      const panel=document.querySelector('.left-panel');
      const pr=panel.getBoundingClientRect();
      if(e.clientX>=pr.left&&e.clientX<=pr.right&&e.clientY>=pr.top&&e.clientY<=pr.bottom){
        // Dropped on panel → remove
        removeRoomObj(objId);
      }else{
        // Dropped on grid → move to snapped cell
        const gridEl=document.getElementById('classroom-grid');
        const gr=gridEl.getBoundingClientRect();
        const col=Math.floor((e.clientX-gr.left)/CELL);
        const row=Math.floor((e.clientY-gr.top)/CELL);
        const obj=roomObjs.find(o=>o.id===objId);
        if(obj&&col>=0&&col<COLS&&row>=0&&row<ROWS){
          obj.col=col;obj.row=row;
        }
        renderRoomObjs();scheduleSave();
      }
    }
  }
});

window.addEventListener('mousemove',e=>{

      }else{
        clearPreview();

      const row=Math.floor((e.clientY-gr.top)/CELL);

      }else{

      }
    }

function attachStudentDropListeners(){
  const scroll=document.getElementById('canvas-scroll');
  scroll.addEventListener('dragover',e=>{
    e.preventDefault();
    document.querySelectorAll('.desk.drag-over').forEach(el=>el.classList.remove('drag-over'));
    for(const el of document.elementsFromPoint(e.clientX,e.clientY))
      if(el.id?.startsWith('desk-')){el.classList.add('drag-over');break;}
  });
  scroll.addEventListener('dragleave',e=>{
    if(!e.currentTarget.contains(e.relatedTarget))
      document.querySelectorAll('.desk.drag-over').forEach(el=>el.classList.remove('drag-over'));
  });
  scroll.addEventListener('drop',e=>{
    e.preventDefault();
    document.querySelectorAll('.desk.drag-over').forEach(el=>el.classList.remove('drag-over'));
    for(const el of document.elementsFromPoint(e.clientX,e.clientY))
      if(el.id?.startsWith('desk-')){handleDropOnDesk(parseInt(el.id.split('-')[1]),e);return;}
  });
}

function getDeskAtPoint(cx,cy){
  for(const el of document.elementsFromPoint(cx,cy))
    if(el.id?.startsWith('desk-'))return desks.find(d=>d.id===parseInt(el.id.split('-')[1]));
  return null;
}
function handleDropOnDesk(deskId,e){
  const studentId=parseInt(e.dataTransfer.getData('text/plain'));
  if(!studentId)return;
  const target=desks.find(d=>d.id===deskId);if(!target)return;
  const prev=desks.find(d=>d.studentId===studentId);
  const displaced=target.studentId;
  if(prev)prev.studentId=displaced||null;
  target.studentId=studentId;
  renderDesks();updateStatus();scheduleSave();
}

function addStudent(){
  const inp=document.getElementById('student-name-input');
  const name=inp.value.trim();if(!name)return;
  students.push({id:++studentCounter,name,color:getColor(studentCounter-1)});
  inp.value='';renderStudentList();updateStatus();scheduleSave();
}
function toggleBulkImport(){document.getElementById('bulk-import-area').classList.toggle('visible');}
function bulkAddStudents(){
  const names=document.getElementById('bulk-textarea').value.trim().split('\n').map(n=>n.trim()).filter(Boolean);
  for(const name of names)students.push({id:++studentCounter,name,color:getColor(studentCounter-1)});
  document.getElementById('bulk-textarea').value='';
  toggleBulkImport();renderStudentList();updateStatus();scheduleSave();
}
function removeStudent(id){
  const desk=desks.find(d=>d.studentId===id);if(desk)desk.studentId=null;
  students=students.filter(s=>s.id!==id);
  renderDesks();renderStudentList();updateStatus();scheduleSave();
}
function setSort(s){
  sortMode=s;
  document.getElementById('sort-name').classList.toggle('active',s==='name');
  document.getElementById('sort-group').classList.toggle('active',s==='group');
  renderStudentList();scheduleSave();
}
function getSortedStudents(){
  const seatedMap={};
  for(const d of desks)if(d.studentId)seatedMap[d.studentId]=d;
  if(sortMode==='group'){
    return[...students].sort((a,b)=>{
      const ga=seatedMap[a.id]?.groupColor||'zzz';
      const gb=seatedMap[b.id]?.groupColor||'zzz';
      return ga===gb?a.name.localeCompare(b.name):ga.localeCompare(gb);
    });
  }
  return[...students].sort((a,b)=>a.name.localeCompare(b.name));
}
function renderStudentList(){
  const list=document.getElementById('student-list');
  list.innerHTML='';
  const seatedMap={};
  for(const d of desks)if(d.studentId)seatedMap[d.studentId]=d.id;
  const sorted=getSortedStudents();
  for(const st of sorted){
    const seatedDeskId=seatedMap[st.id],seated=!!seatedDeskId;
    const canDrag=!seated&&mode==='student';
    const chip=document.createElement('div');
    chip.className='student-chip'+(seated?' seated':canDrag?'':' no-drag');
    const av=document.createElement('div');
    av.className='s-avatar';av.style.background=st.color;
    av.textContent=initials(st.name);chip.appendChild(av);
    const nm=document.createElement('span');
    nm.className='s-name';nm.textContent=st.name;chip.appendChild(nm);
    if(seated){
      const desk=desks.find(d=>d.id===seatedDeskId);
      if(desk?.groupColor){
        const dot=document.createElement('div');
        dot.className='s-group-dot';dot.style.background=desk.groupColor;
        chip.appendChild(dot);
      }
    }
    const del=document.createElement('span');
    del.className='del-student';del.innerHTML='×';
    del.addEventListener('click',e=>{e.stopPropagation();removeStudent(st.id);});
    chip.appendChild(del);
    chip.draggable=canDrag;
    if(canDrag){
      chip.addEventListener('dragstart',e=>{
        e.dataTransfer.setData('text/plain',String(st.id));
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setDragImage(document.getElementById('drag-img'),0,0);
        chip.classList.add('dragging');
        const g=document.getElementById('drag-ghost');
        g.textContent=st.name;g.style.display='block';
        g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';
      });
      chip.addEventListener('dragend',()=>{chip.classList.remove('dragging');document.getElementById('drag-ghost').style.display='none';});
    }
    list.appendChild(chip);
  }
  document.getElementById('student-count').textContent=students.length;
}

// ══════════════════════════════════════════════════════════════════════
// RENDER TO CANVAS (for export)
// ══════════════════════════════════════════════════════════════════════
function getUsedBounds(){
  // Find bounding box of all desks + objects + walls
  let minC=COLS,maxC=0,minR=ROWS,maxR=0;
  for(const d of desks){minC=Math.min(minC,d.col);maxC=Math.max(maxC,d.col);minR=Math.min(minR,d.row);maxR=Math.max(maxR,d.row);}
  for(const o of roomObjs){
    const[cw,rh]=getObjPxSize(o.type,o.rotation).map(v=>Math.ceil(v/CELL));
    minC=Math.min(minC,o.col);maxC=Math.max(maxC,o.col+cw-1);
    minR=Math.min(minR,o.row);maxR=Math.max(maxR,o.row+rh-1);
  }
  for(const key of walls){
    const[,r,c]=key.split(':');
    minC=Math.min(minC,+c);maxC=Math.max(maxC,+c);
    minR=Math.min(minR,+r);maxR=Math.max(maxR,+r);
  }
  if(minC>maxC){minC=0;maxC=COLS-1;minR=0;maxR=ROWS-1;}
  return{minC:Math.max(0,minC-1),maxC:Math.min(COLS-1,maxC+1),minR:Math.max(0,minR-1),maxR:Math.min(ROWS-1,maxR+1)};
}

async function renderClassroomToCanvas(scale=2){
  const{minC,maxC,minR,maxR}=getUsedBounds();
  const usedCols=maxC-minC+1,usedRows=maxR-minR+1;
  const W=usedCols*CELL*scale,H=usedRows*CELL*scale;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.scale(scale,scale);
  const offX=-minC*CELL,offY=-minR*CELL;

  // Background
  ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,W/scale,H/scale);
  // Grid
  ctx.strokeStyle='#c8c2b4';ctx.lineWidth=0.8;
  for(let c=minC;c<=maxC+1;c++){ctx.beginPath();ctx.moveTo((c-minC)*CELL,0);ctx.lineTo((c-minC)*CELL,usedRows*CELL);ctx.stroke();}
  for(let r=minR;r<=maxR+1;r++){ctx.beginPath();ctx.moveTo(0,(r-minR)*CELL);ctx.lineTo(usedCols*CELL,(r-minR)*CELL);ctx.stroke();}
  // Walls
  ctx.strokeStyle='#1a1a2e';ctx.lineWidth=3;ctx.lineCap='square';
  for(const key of walls){
    const[tp,rs,cs]=key.split(':');const r=+rs,c=+cs;
    if(r<minR-1||r>maxR+1||c<minC-1||c>maxC+1)continue;
    ctx.beginPath();
    if(tp==='h'){ctx.moveTo((c-minC)*CELL,(r-minR+1)*CELL);ctx.lineTo((c-minC+1)*CELL+offX%CELL,(r-minR+1)*CELL);}
    else{ctx.moveTo((c-minC+1)*CELL,(r-minR)*CELL);ctx.lineTo((c-minC+1)*CELL,(r-minR+1)*CELL);}
    ctx.stroke();
  }
  // Desks
  for(const desk of desks){
    const gc=desk.groupColor;
    const x=(desk.col-minC)*CELL+2,y=(desk.row-minR)*CELL+2,w=CELL-4,h=CELL-4;
    ctx.save();
    ctx.beginPath();ctx.roundRect(x,y,w,h,6);
    ctx.fillStyle=gc||(desk.studentId?'#d4f0ed':'#fffef9');
    ctx.fill();
    ctx.strokeStyle=gc||'#d4cfc4';ctx.lineWidth=2;ctx.stroke();
    const student=desk.studentId?students.find(s=>s.id===desk.studentId):null;
    if(student){
      const textColor=gc?(isColorDark(gc)?'#fff':'#1a1a2e'):'#1a1a2e';
      ctx.fillStyle=textColor;
      ctx.textAlign='center';ctx.textBaseline='middle';
      const pad=4; // px padding inside desk
      const maxW=w-pad*2;
      const parts=student.name.split(' ');
      const firstName=parts[0];
      const lastInitials=parts.slice(1).map(p=>p[0]+'.').join(' ');

      // Helper: find largest font size where text fits within maxW
      function fitFont(text,maxSize,bold){
        let size=maxSize;
        while(size>7){
          ctx.font=`${bold?'bold ':''}${size}px Arial,sans-serif`;
          if(ctx.measureText(text).width<=maxW) break;
          size--;
        }
        return size;
      }

      if(parts.length===1){
        const sz=fitFont(firstName,Math.floor(h*0.32),true);
        ctx.font=`bold ${sz}px Arial,sans-serif`;
        ctx.fillText(firstName,x+w/2,y+h/2);
      }else{
        const sz1=fitFont(firstName,Math.floor(h*0.28),true);
        ctx.font=`bold ${sz1}px Arial,sans-serif`;
        const lineH=sz1*1.25;
        ctx.fillText(firstName,x+w/2,y+h/2-lineH*0.4);
        const sz2=fitFont(lastInitials,Math.floor(sz1*0.85),false);
        ctx.font=`${sz2}px Arial,sans-serif`;
        ctx.fillText(lastInitials,x+w/2,y+h/2+lineH*0.6);
      }
    }
    ctx.restore();
  }
  // Room objects (draw as colored rects with labels — SVG loading async is complex)
  // Draw room objects — same styled-box as editor
  for(const obj of roomObjs){
    const[pw,ph]=getObjPxSize(obj.type,obj.rotation,obj);
    const x=(obj.col-minC)*CELL+2,y=(obj.row-minR)*CELL+2;
    const sty=OBJ_STYLE[obj.type]||['#e8e0d4','#9b59b6','#333','?'];
    ctx.save();
    if(obj.type==='label'){
      const lc=obj.color||'#ffe066';
      const isCircle=(obj.lw||1)===1&&(obj.lh||1)===1;
      ctx.beginPath();
      if(isCircle){
        ctx.arc(x+pw/2,y+ph/2,Math.min(pw,ph)/2-1,0,Math.PI*2);
      }else{
        ctx.roundRect(x,y,pw,ph,8);
      }
      ctx.fillStyle=lc;ctx.fill();
      ctx.strokeStyle=darkenColor(lc,30);ctx.lineWidth=2;ctx.stroke();
      // Fit text inside label
      ctx.fillStyle=isColorDark(lc)?'#fff':'rgba(0,0,0,0.72)';
      ctx.textAlign='center';ctx.textBaseline='middle';
      const labelText=obj.text||'?';
      const pad=8;
      const maxLabelW=pw-pad*2;
      let lsz=Math.floor(Math.min(pw,ph)*0.28);
      while(lsz>8){
        ctx.font=`bold ${lsz}px Arial,sans-serif`;
        if(ctx.measureText(labelText).width<=maxLabelW)break;
        lsz--;
      }
      ctx.font=`bold ${lsz}px Arial,sans-serif`;
      ctx.fillText(labelText,x+pw/2,y+ph/2);
    }else{
      // Box
      ctx.beginPath();ctx.roundRect(x,y,pw,ph,4);
      ctx.fillStyle=sty[0];ctx.fill();
      ctx.strokeStyle=sty[1];ctx.lineWidth=2;ctx.stroke();
      // Icon
      const iconSize=Math.min(pw,ph)*0.38;
      ctx.font=`${iconSize}px sans-serif`;
      ctx.fillStyle=sty[1];
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(sty[3],x+pw/2,y+ph/2-6);
      // Type label
      const lblSize=Math.min(pw*0.18,9);
      ctx.font=`${lblSize}px DM Mono,monospace`;
      ctx.fillStyle=sty[2];
      ctx.fillText(t('obj'+obj.type.charAt(0).toUpperCase()+obj.type.slice(1)),x+pw/2,y+ph-8);
    }
    ctx.restore();
  }
  return canvas;
}

async function exportImage(){
  const canvas=await renderClassroomToCanvas(3);
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');a.download='classroom.png';a.click();
}

async function exportPDF(){
  const canvas=await renderClassroomToCanvas(2);
  const{minC,maxC,minR,maxR}=getUsedBounds();
  const usedCols=maxC-minC+1,usedRows=maxR-minR+1;
  const wMM=usedCols*CELL*0.264583,hMM=usedRows*CELL*0.264583;
  const isLandscape=wMM>hMM;
  const pW=isLandscape?297:210,pH=isLandscape?210:297;
  const scaleX=(pW-20)/wMM,scaleY=(pH-20)/hMM;
  const sc=Math.min(scaleX,scaleY);
  const imgW=wMM*sc,imgH=hMM*sc;
  const offX=(pW-imgW)/2,offY=(pH-imgH)/2;
  const imgData=canvas.toDataURL('image/png');

  // Minimal PDF generation without external libs
  const pdfLines=[];
  const addLine=s=>pdfLines.push(s);
  const enc=s=>s.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');

  // Convert png to base64 for embedding
  const b64=imgData.split(',')[1];
  const imgBytes=atob(b64);
  const imgLen=imgBytes.length;

  addLine('%PDF-1.4');
  const offsets=[];
  // Obj 1: catalog
  offsets[1]=pdfLines.join('\n').length+1;
  addLine('1 0 obj<</Type/Catalog/Pages 2 0 R>>endobj');
  // Obj 2: pages
  offsets[2]=pdfLines.join('\n').length+1;
  addLine(`2 0 obj<</Type/Pages/Kids[3 0 R]/Count 1>>endobj`);
  // Obj 3: page
  offsets[3]=pdfLines.join('\n').length+1;
  const pwPt=Math.round(pW*2.83465),phPt=Math.round(pH*2.83465);
  addLine(`3 0 obj<</Type/Page/Parent 2 0 R/MediaBox[0 0 ${pwPt} ${phPt}]/Contents 4 0 R/Resources<</XObject<</Im1 5 0 R>>>>>>endobj`);
  // Obj 4: content stream
  const imgWPt=Math.round(imgW*2.83465),imgHPt=Math.round(imgH*2.83465);
  const offXPt=Math.round(offX*2.83465),offYPt=Math.round((pH-offY-imgH)*2.83465);
  const stream=`q ${imgWPt} 0 0 ${imgHPt} ${offXPt} ${offYPt} cm /Im1 Do Q`;
  offsets[4]=pdfLines.join('\n').length+1;
  addLine(`4 0 obj<</Length ${stream.length}>>\nstream\n${stream}\nendstream endobj`);
  // Use print dialog for PDF (reliable cross-browser)
  const printWin=window.open('','_blank');
  printWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Classroom</title>
    <style>@media print{@page{size:${isLandscape?'landscape':'portrait'};margin:10mm;}body{margin:0;}img{max-width:100%;height:auto;display:block;margin:auto;}}</style>
    </head><body><img src="${imgData}"></body></html>`);
  printWin.document.close();
  printWin.focus();
  setTimeout(()=>printWin.print(),500);
}

// KEYBOARD
// ══════════════════════════════════════════════════════════════════════
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='w'||e.key==='W')setMode('wall');
  if(e.key==='d'||e.key==='D')setMode('desk');
  if(e.key==='s'||e.key==='S')setMode('student');
  if(e.key==='o'||e.key==='O')setMode('object');
  if(e.key==='Escape'){
    if(mode==='desk'){selectedDesks.clear();renderDesks();hideWidget();}
    if(mode==='object'){selectedObjType=null;buildObjPalette();clearPreview();}
    closeLabelEditor();
  }
  if(e.key==='Delete'&&selectedDesks.size>0&&mode==='desk')deleteSelectedDesks();
});

// Pre-load SVG data URIs for canvas export
const OBJ_SVG_DATA={};
async function loadSVGsForExport(){
  for(const[type,src]of Object.entries(OBJ_SVGS)){
    try{
      const r=await fetch(src);
      const txt=await r.text();
      const b64=btoa(unescape(encodeURIComponent(txt)));
      OBJ_SVG_DATA[type]='data:image/svg+xml;base64,'+b64;
    }catch(e){OBJ_SVG_DATA[type]=null;}
  }
}

// ── DROPDOWN LOGIC ──
function closeDropdowns(){
  document.querySelectorAll('.dropdown-menu.open').forEach(m=>m.classList.remove('open'));
  document.querySelectorAll('.dropdown-btn.open').forEach(b=>b.classList.remove('open'));
}
function setupDropdowns(){
  // Toggle buttons
  ['dd-manage','dd-save'].forEach(id=>{
    const btn=document.getElementById(id+'-btn');
    const menu=document.getElementById(id+'-menu');
    if(!btn||!menu)return;
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const isOpen=menu.classList.contains('open');
      closeDropdowns();
      if(!isOpen){
        const r=btn.getBoundingClientRect();
        menu.style.top=(r.bottom+4)+'px';
        menu.style.left=r.left+'px';
        menu.classList.add('open');
        btn.classList.add('open');
      }
    });
  });
  // Menu item actions
  const actions={
    'dm-clearWalls':  ()=>clearWalls(),
    'dm-clearDesks':  ()=>clearAllDesks(),
    'dm-clearStudents':()=>clearStudentList(),
    'dm-resetAll':    ()=>resetEverything(),
    'dm-saveClassroom':()=>exportBackup(),
    'dm-loadClassroom':()=>document.getElementById('import-file').click(),
    'dm-exportImage': ()=>exportImage(),
    'dm-exportPDF':   ()=>exportPDF(),
  };
  Object.entries(actions).forEach(([id,fn])=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('click',e=>{e.stopPropagation();closeDropdowns();fn();});
  });
  // Close on outside click
  document.addEventListener('click',()=>closeDropdowns());
}

const savedMode=loadState();
setupGrid();
setupInteractionLayer();
attachDeskLayerListeners();
attachStudentDropListeners();
buildWidget();
buildObjPalette();
applyTranslations();
renderDesks();
renderRoomObjs();
updateStatus();
setMode(savedMode||'desk');
loadSVGsForExport();
setupDropdowns();
</script>
